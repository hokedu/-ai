<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 同声传译 · 实时字幕</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'SF Pro Display', 'Inter', ui-sans-serif, system-ui, sans-serif;
    background: transparent;
    -webkit-font-smoothing: antialiased;
    -webkit-app-region: no-drag;
  }

  /* ── Glass-morphism surface ── */
  .pip-shell {
    display: flex;
    flex-direction: column;
    height: 100%;
    background: rgba(24, 24, 28, 0.88);
    backdrop-filter: blur(28px) saturate(1.3);
    -webkit-backdrop-filter: blur(28px) saturate(1.3);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
  }

  /* ── Drag region ── */
  .pip-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    -webkit-app-region: drag;
    app-region: drag;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    flex-shrink: 0;
    cursor: move;
  }
  .pip-title {
    font-size: 12px;
    font-weight: 600;
    color: #f4f4f5;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .pip-count {
    font-size: 10px;
    color: #a1a1aa;
    background: rgba(255, 255, 255, 0.08);
    padding: 1px 7px;
    border-radius: 9px;
  }

  /* ── Buttons (excluded from drag) ── */
  .pip-actions {
    display: flex;
    gap: 4px;
    -webkit-app-region: no-drag;
    app-region: no-drag;
  }
  .pip-btn {
    width: 28px; height: 28px;
    padding: 0;
    border: 1px solid transparent;
    border-radius: 6px;
    background: transparent;
    color: #a1a1aa;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 150ms ease;
  }
  .pip-btn:hover { background: rgba(255,255,255,0.1); color: #f4f4f5; }
  .pip-btn:disabled { opacity: 0.3; cursor: default; }
  .pip-btn.danger:hover { background: rgba(239,68,68,0.15); color: #ef4444; }

  /* ── Subtitle list ── */
  .pip-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .pip-list::-webkit-scrollbar { width: 3px; }
  .pip-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

  .pip-empty {
    color: #71717a;
    font-size: 12px;
    text-align: center;
    padding: 28px 0;
  }

  .pip-item {
    padding: 7px 11px;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 7px;
    animation: pip-in 280ms ease-out;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  @keyframes pip-in {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .pip-time {
    font-size: 9px;
    color: #71717a;
  }
  .pip-text {
    font-size: 13px;
    color: #f4f4f5;
    line-height: 1.45;
    word-break: break-word;
  }

  /* ── Resize handle (bottom-right corner) ── */
  .pip-resize-handle {
    position: absolute;
    bottom: 4px;
    right: 4px;
    width: 20px;
    height: 20px;
    cursor: nwse-resize;
    background: linear-gradient(135deg, transparent 50%, rgba(255,255,255,0.1) 50%);
    border-radius: 0 0 10px 0;
    z-index: 10;
    -webkit-app-region: no-drag;
    app-region: no-drag;
  }
</style>
</head>
<body>
<div class="pip-shell">
  <div class="pip-header">
    <span class="pip-title">
      🎙️ 实时翻译字幕
      <span class="pip-count" id="pipCount">0</span>
    </span>
    <div class="pip-actions">
      <button class="pip-btn" id="btnClear" title="清空字幕" disabled>🗑️</button>
      <button class="pip-btn" id="btnSave" title="保存到我的收藏" disabled>💾</button>
      <button class="pip-btn danger" id="btnClose" title="关闭浮窗">✕</button>
    </div>
  </div>
  <div class="pip-list" id="pipList">
    <p class="pip-empty">等待翻译结果...</p>
  </div>
</div>
<div class="pip-resize-handle" id="resizeHandle"></div>

<script>
  // ── State ──
  var entries = [];

  var listEl = document.getElementById('pipList');
  var countEl = document.getElementById('pipCount');
  var btnClear = document.getElementById('btnClear');
  var btnSave = document.getElementById('btnSave');
  var btnClose = document.getElementById('btnClose');

  // ── BroadcastChannel (same protocol as browser PiP) ──
  var channel = new BroadcastChannel('pip-subtitles');

  function formatTime(ts) {
    return new Date(ts).toLocaleTimeString('zh-CN', {
      hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
  }

  function render() {
    countEl.textContent = entries.length;
    btnClear.disabled = entries.length === 0;
    btnSave.disabled = entries.length === 0;

    if (entries.length === 0) {
      listEl.innerHTML = '<p class="pip-empty">等待翻译结果...</p>';
      return;
    }

    var html = '';
    for (var i = 0; i < entries.length; i++) {
      var e = entries[i];
      html +=
        '<div class="pip-item">' +
        '<span class="pip-time">' + formatTime(e.timestamp) + '</span>' +
        '<p class="pip-text">' + escapeHtml(e.translation) + '</p>' +
        '</div>';
    }
    listEl.innerHTML = html;
    listEl.scrollTop = listEl.scrollHeight;
  }

  function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // ── Receive from main window ──
  channel.onmessage = function (event) {
    var msg = event.data;
    switch (msg.type) {
      case 'sync':
        entries = msg.entries || [];
        render();
        break;
      case 'add':
        entries.push(msg.entry);
        render();
        break;
      case 'correct':
        for (var i = 0; i < entries.length; i++) {
          if (entries[i].id === msg.id) {
            entries[i].translation = msg.newTranslation;
            entries[i].confidence = msg.confidence || entries[i].confidence;
            break;
          }
        }
        render();
        break;
      case 'clear':
        entries = [];
        render();
        channel.postMessage({ type: 'cleared' });
        break;
    }
  };

  // ── Actions → main window ──
  btnClear.addEventListener('click', function () {
    entries = [];
    render();
    channel.postMessage({ type: 'clear' });
  });

  btnSave.addEventListener('click', function () {
    channel.postMessage({ type: 'save', entries: entries });
  });

  btnClose.addEventListener('click', function () {
    channel.postMessage({ type: 'close' });
  });
</script>
</body>
</html>
